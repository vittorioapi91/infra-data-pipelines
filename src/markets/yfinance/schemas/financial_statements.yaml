# Financial statements (one object per symbol)
# Source: Ticker income_stmt, balance_sheet, cashflow (yearly + quarterly)
#
# Root: object with 6 keys. Each key is optional; type is list | null.
# List element (Row): object with _index: str and <period>: optional float.
# Period keys are ISO date strings (e.g. "2025-10-31T00:00:00"). Value type: float | null.
---
# Root keys: all optional; type list | null. Element type = Row.
balance_sheet: optional list | null
cashflow: optional list | null
income_stmt: optional list | null
quarterly_balance_sheet: optional list | null
quarterly_cashflow: optional list | null
quarterly_income_stmt: optional list | null

# Row (element of each list above) — subkeys (same for all six lists):
row_subkeys:
  _index: str
  "2021-03-31T00:00:00": optional float
  "2021-06-30T00:00:00": optional float
  "2021-09-30T00:00:00": optional float
  "2021-10-31T00:00:00": optional float
